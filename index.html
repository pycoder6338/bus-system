<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Bus System</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg, #1a1a1a, #000);
  color: white;
  text-align: center;
}

header {
  background: rgba(255, 204, 0, 0.9);
  backdrop-filter: blur(10px);
  color: black;
  padding: 15px;
  font-size: 26px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

input {
  padding: 12px;
  width: 60%;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  outline: none;
}

button {
  padding: 12px 18px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  background: #ffcc00;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

.card {
  background: rgba(255,255,255,0.08);
  margin: 15px auto;
  padding: 20px;
  border-radius: 15px;
  width: 70%;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 15px rgba(255,204,0,0.3);
  animation: fadeIn 0.5s ease;
}

select {
  padding: 10px;
  border-radius: 10px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<header id="title">🚌 Smart Bus Finder</header>

<div class="container">

<!-- Language -->

<select onchange="changeLanguage(this.value)">
  <option value="en">English</option>
  <option value="ta">தமிழ்</option>
  <option value="hi">हिन्दी</option>
</select>

<h2 id="searchText">Search your destination</h2>

<input type="text" id="search" placeholder="Enter place..." onkeypress="handleKey(event)">
<br>
<button onclick="searchBus()">Search</button>

<div id="result"></div>

<h2 id="qrText">Scan QR on Bus to view details</h2>

</div>

<script>

// BUS DATA WITH MAP LINKS
const buses = [
  {
    number: "21G",
    stops: ["Central Station", "Park", "Marina Beach"],
    fare: "₹15",
    map: "https://www.google.com/maps/dir/Central+Station/Marina+Beach"
  },
  {
    number: "47A",
    stops: ["T Nagar", "Museum", "Marina Beach"],
    fare: "₹20",
    map: "https://www.google.com/maps/dir/T+Nagar/Marina+Beach"
  },
  {
    number: "5E",
    stops: ["Tambaram", "Guindy", "T Nagar"],
    fare: "₹18",
    map: "https://www.google.com/maps/dir/Tambaram/T+Nagar"
  }
];

// SEARCH FUNCTION
function searchBus() {
  let input = document.getElementById("search").value.toLowerCase();
  let result = "";
  let shown = new Set();

  buses.forEach(bus => {
    bus.stops.forEach(stop => {
      if (stop.toLowerCase().includes(input) && !shown.has(bus.number)) {
        shown.add(bus.number);

        result += `
        <div class="card">
          <h3>🚌 Bus ${bus.number}</h3>
          <p>Route: ${bus.stops.join(" → ")}</p>
          <p>Fare: ${bus.fare}</p>
          <button onclick="openMap('${bus.map}')">View Route Map 🗺️</button>
        </div>`;
      }
    });
  });

  document.getElementById("result").innerHTML =
    result || "<p>No buses found 😢</p>";
}

// OPEN MAP
function openMap(link) {
  window.open(link, "_blank");
}

// ENTER KEY
function handleKey(event) {
  if (event.key === "Enter") {
    searchBus();
  }
}

</script>



</body>
</html>
