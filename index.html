
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Bus System</title>

<style>

/* 🌈 BACKGROUND ANIMATION */
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  color: white;
  text-align: center;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #00c6ff);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
  0% {background-position: 0%;}
  50% {background-position: 100%;}
  100% {background-position: 0%;}
}

header {
  font-size: 28px;
  padding: 20px;
  font-weight: bold;
}

/* INPUT */
input {
  padding: 12px;
  width: 60%;
  border-radius: 30px;
  border: none;
  outline: none;
  text-align: center;
}

/* BUTTON */
button {
  padding: 10px 15px;
  margin: 8px;
  border-radius: 20px;
  border: none;
  background: #00c6ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;
  width: 70%;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  animation: fadeIn 0.4s ease;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 25px rgba(0,198,255,0.6);
}

/* BADGES */
.badge {
  display: inline-block;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 20px;
  background: rgba(0,0,0,0.5);
}

/* LOADER */
.loader {
  margin: 20px auto;
  border: 5px solid rgba(255,255,255,0.2);
  border-top: 5px solid #00c6ff;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

.hidden {
  display: none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.fav-title {
  margin-top: 40px;
}

</style>

</head>

<body>

<header>🚌 Smart Bus Finder</header>

<input type="text" id="search" placeholder="Search bus number or destination (e.g. 21G, Marina Beach)" onkeypress="handleKey(event)">
<br>

<button onclick="searchBus()">Search</button> <button onclick="startVoice()">🎤 Speak</button>

<button onclick="showAll()">🚌 Show All Buses</button>

<div id="loader" class="loader hidden"></div>

<div id="result"></div>

<h2 class="fav-title">⭐ Your Favorites</h2>
<div id="favorites"></div>

<script>

const buses = [
  {
    number: "21G",
    stops: ["Central Station", "Park", "Marina Beach"],
    fare: "₹15",
    timing: "Every 10 mins",
    next: "5 mins",
    map: "https://www.google.com/maps/dir/?api=1&origin=Central+Station&destination=Marina+Beach&travelmode=transit"
  },
  {
    number: "47A",
    stops: ["T Nagar", "Museum", "Marina Beach"],
    fare: "₹20",
    timing: "Every 15 mins",
    next: "8 mins",
    map: "https://www.google.com/maps/dir/?api=1&origin=T+Nagar&destination=Marina+Beach&travelmode=transit"
  },
  {
    number: "5E",
    stops: ["Tambaram", "Guindy", "T Nagar"],
    fare: "₹18",
    timing: "Every 20 mins",
    next: "12 mins",
    map: "https://www.google.com/maps/dir/?api=1&origin=Tambaram&destination=T+Nagar&travelmode=transit"
  }
];

// SEARCH
function searchBus() {
  const input = document.getElementById("search").value.toLowerCase().trim();
  const loader = document.getElementById("loader");
  const resultDiv = document.getElementById("result");

  loader.classList.remove("hidden");
  resultDiv.innerHTML = "";

  setTimeout(() => {
    try {
      let result = "";
      let count = 0;

      buses.forEach(bus => {
        if (
          input === "" ||
          bus.number.toLowerCase().includes(input) ||
          bus.stops.join(" ").toLowerCase().includes(input)
        ) {
          result += createCard(bus);
          count++;
        }
      });

resultDiv.innerHTML =
  (count ? "<h3 style='opacity:0.8'>" + count + " buses found</h3>" : "") +
  (result || "<p style='opacity:0.7'>🚫 No buses found<br>Try searching another location</p>");
    } catch (err) {
      console.error(err);
      resultDiv.innerHTML = "<p>⚠️ Error loading buses</p>";
    } finally {
      loader.classList.add("hidden");
    }
  }, 400);
}

// SHOW ALL CARD

function showAll() {
  document.getElementById("search").value = "";
  searchBus();
}

// CARD
function createCard(bus) {
  return `
  <div class="card">
    <h2>🚌 ${bus.number}</h2>
    <p>${bus.stops.join(" → ")}</p>

    <div class="badge">💸 ${bus.fare}</div>
    <div class="badge">⏰ ${bus.next}</div>
    <div class="badge">📅 ${bus.timing}</div>

    <br>
    <button onclick="openMap('${bus.map}')">🗺️ Map</button>
    <button onclick="toggleFav('${bus.number}')">
      ${isFav(bus.number) ? "⭐ Saved" : "☆ Save"}
    </button>
  </div>`;
}

// FAVORITES
function toggleFav(num) {
  let favs = JSON.parse(localStorage.getItem("favs")) || [];

  if (favs.includes(num)) {
    favs = favs.filter(f => f !== num);
  } else {
    favs.push(num);
  }

  localStorage.setItem("favs", JSON.stringify(favs));
  renderFavs();
  searchBus();
}

function isFav(num) {
  let favs = JSON.parse(localStorage.getItem("favs")) || [];
  return favs.includes(num);
}

function renderFavs() {
  let favs = JSON.parse(localStorage.getItem("favs")) || [];
  let html = "";

  favs.forEach(num => {
    let bus = buses.find(b => b.number === num);
    if (bus) html += createCard(bus);
  });

  document.getElementById("favorites").innerHTML =
    html || "<p>No favorites yet ⭐</p>";
}

// MAP
function openMap(link) {
  window.open(link, "_blank");
}

// ENTER
function handleKey(e) {
  if (e.key === "Enter") searchBus();
}

// VOICE
function startVoice() {
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = "en-IN";

  rec.onresult = function(e) {
    document.getElementById("search").value = e.results[0][0].transcript;
    searchBus();
  };

  rec.start();
}

// LOAD
window.onload = function() {
  renderFavs();
};

</script>

</body>
</html>
